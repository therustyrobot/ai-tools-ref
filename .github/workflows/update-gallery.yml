name: Update Gallery

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Verify account
        run: echo "Running as $GITHUB_ACTOR"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Fetch starred repos
        env:
          GITHUB_TOKEN: ${{ secrets.STARS_TOKEN }}
        run: python3 scripts/fetch_stars.py

      - name: Categorize repos
        run: python3 scripts/categorize.py

      - name: Generate HTML
        run: python3 scripts/generate.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: regenerate stars gallery [skip ci]"
          git push
